name: Criterion Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # lets you trigger it manually too

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state file

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm install node-fetch cheerio @atproto/api

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: node bot.js

      - name: Commit state
        run: |
          git config user.name "criterion-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ ! -f state.json ]; then
            echo '{}' > state.json
          fi
          git add state.json
          if ! git diff --staged --quiet; then
            git commit -m "update state"
            git push
          else
            echo "No state change to commit."
          fi
